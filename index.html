<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Tech Maker BR</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="logo.png">

<style>
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: url('bg2.jpg');
    background-size: cover;
    background-position: center;
    color: black;
}

header {
    height: 100px;
    background: url('bg1.jpg');
    background-size: cover;
    background-position: center;

    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

.logo {
    position: absolute;
    left: 10px;
    height: 230px;
}

.titulo {
    font-size: 26px;
    font-weight: bold;
    color: #00bcd4;

    text-shadow:
        0 0 3px #00bcd4,
        0 0 6px #00bcd4,
        1px 1px 2px black;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* LINK LIMPO */
a {
    text-decoration: none;
    color: inherit;
}

/* 🔥 CARD COM BORDA */
.card {
    height: 150px;
    position: relative;
    overflow: hidden;
    border-radius: 10px;
    transition: transform 0.25s ease;

    border: 4px solid black;
    box-shadow: 0 4px 10px rgba(0,0,0,0.6);
}

.card:hover {
    transform: scale(1.12);

    border-color: #00bcd4;

    box-shadow: 
        0 6px 15px rgba(0,0,0,0.8),
        0 0 10px #00bcd4;
}

.card:active {
    transform: scale(1.05);
}

.card-bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    transition: opacity 0.6s ease;
    opacity: 0;
}

.card span {
    position: relative;
    z-index: 2;
    display: flex;
    height: 100%;
    align-items: center;
    justify-content: center;

    font-size: 20px;
    font-weight: bold;
    font-family: 'Orbitron', sans-serif;
    text-align: center;

    color: #00bcd4;

    text-shadow:
        0 0 3px #00bcd4,
        0 0 6px #00bcd4,
        1px 1px 2px black;

    transition: opacity 0.3s ease;
}

.card.imagem-ativa span {
    opacity: 0;
}

/* CORES */
.games { background: #ef4444; }
.emuladores { background: #3b82f6; }
.programas { background: #22c55e; }
.apks { background: #ec4899; }
.ebooks { background: #a855f7; }
.eletrica { background: #f97316; }
.arduino { background: #14b8a6; }
.videos { background: #06b6d4; }
.cursos { background: #eab308; }

</style>
</head>

<body>

<header>
    <img src="logo.png" class="logo">
    <div class="titulo">Conhecimento, Tecnologia Eletrônica e Games.</div>
</header>

<div class="grid">

<a href="games.html">
<div class="card games" data-pasta="games"><div class="card-bg"></div><span>Games</span></div>
</a>

<a href="emuladores.html">
<div class="card emuladores" data-pasta="emuladores"><div class="card-bg"></div><span>Emuladores</span></div>
</a>

<a href="programas.html">
<div class="card programas" data-pasta="programas"><div class="card-bg"></div><span>Programas (Windows)</span></div>
</a>

<a href="apks.html">
<div class="card apks" data-pasta="apks"><div class="card-bg"></div><span>APKs (Android)</span></div>
</a>

<a href="ebooks.html">
<div class="card ebooks" data-pasta="ebooks"><div class="card-bg"></div><span>E-books</span></div>
</a>

<a href="eletrica.html">
<div class="card eletrica" data-pasta="eletrica"><div class="card-bg"></div><span>Projetos Elétricos</span></div>
</a>

<a href="arduino.html">
<div class="card arduino" data-pasta="arduino"><div class="card-bg"></div><span>Arduino</span></div>
</a>

<a href="videos.html">
<div class="card videos" data-pasta="videos"><div class="card-bg"></div><span>Vídeos</span></div>
</a>

<a href="cursos.html">
<div class="card cursos" data-pasta="cursos"><div class="card-bg"></div><span>Cursos</span></div>
</a>

</div>

<script>
const cards = document.querySelectorAll('.card');

let cardIndex = 0;
let imagemIndex = 1;
let hoverAtivo = false;

function mostrarCarta() {

    if (hoverAtivo) {
        setTimeout(mostrarCarta, 500);
        return;
    }

    const card = cards[cardIndex];
    const bg = card.querySelector('.card-bg');
    const pasta = card.dataset.pasta;

    const img = new Image();
    img.src = `imagens/${pasta}/${imagemIndex}.jpg`;

    img.onload = () => {
        bg.style.backgroundImage = `url('${img.src}')`;
        bg.style.opacity = 1;
        card.classList.add('imagem-ativa');

        setTimeout(() => {
            bg.style.opacity = 0;
            card.classList.remove('imagem-ativa');

            cardIndex++;

            if (cardIndex >= cards.length) {
                cardIndex = 0;
                imagemIndex++;
            }

            setTimeout(mostrarCarta, 300);

        }, 2000);
    };

    img.onerror = () => {
        cardIndex++;

        if (cardIndex >= cards.length) {
            cardIndex = 0;
            imagemIndex = 1;
        }

        setTimeout(mostrarCarta, 300);
    };
}

cards.forEach(card => {

    let intervalo;
    let index = 1;
    const bg = card.querySelector('.card-bg');
    const pasta = card.dataset.pasta;

    card.addEventListener('mouseenter', () => {
        hoverAtivo = true;

        intervalo = setInterval(() => {

            const img = new Image();
            img.src = `imagens/${pasta}/${index}.jpg`;

            img.onload = () => {
                bg.style.backgroundImage = `url('${img.src}')`;
                bg.style.opacity = 1;
                card.classList.add('imagem-ativa');

                setTimeout(() => {
                    bg.style.opacity = 0;
                    card.classList.remove('imagem-ativa');
                }, 1000);

                index++;
            };

            img.onerror = () => {
                index = 1;
            };

        }, 1500);
    });

    card.addEventListener('mouseleave', () => {
        clearInterval(intervalo);
        hoverAtivo = false;
    });

});

mostrarCarta();
</script>

</body>
</html>
