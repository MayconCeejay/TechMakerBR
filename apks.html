<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>APKs (Android)</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="logo.png">

<style>
html, body { height: 100%; }

body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: url('bg2.jpg');
    background-size: cover;
    background-position: center;
    color: black;
}

header {
    height: 100px;
    background: url('bg1.jpg');
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

.logo { position: absolute; left: 10px; height: 230px; }

.titulo {
    font-size: 52px;
    font-weight: bold;
    letter-spacing: 3px;
    position: relative;
    
    color: #ff1744;

    /* 🔥 glow cyberpunk */
    text-shadow:
        0 0 5px #ff1744,
        0 0 10px #ff1744,
        0 0 20px #ff1744,
        0 0 40px #ff0000,
        2px 2px 4px black;

    /* 🔥 animações */
    animation: pulsar 2s infinite, corRGB 6s infinite;
}

/* 🔥 PULSO tipo LED */
@keyframes pulsar {
    0%   { transform: scale(1); opacity: 1; }
    50%  { transform: scale(1.05); opacity: 0.85; }
    100% { transform: scale(1); opacity: 1; }
}

/* 🔥 COR MUDANDO DEVAGAR */
@keyframes corRGB {
    0%   { color: #ff1744; }
    25%  { color: #ff9100; }
    50%  { color: #ffea00; }
    75%  { color: #ff00c8; }
    100% { color: #ff1744; }
}

/* 🔥 GLITCH (duplicação do texto) */
.titulo::before,
.titulo::after {
    content: "APKs (Android)";
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    overflow: hidden;
}

/* camada glitch azul */
.titulo::before {
    color: #00e5ff;
    z-index: -1;
    animation: glitch1 2s infinite;
}

/* camada glitch vermelha deslocada */
.titulo::after {
    color: #ff0000;
    z-index: -2;
    animation: glitch2 2s infinite;
}

@keyframes glitch1 {
    0% { transform: translate(0); }
    20% { transform: translate(-2px, 2px); }
    40% { transform: translate(-2px, -2px); }
    60% { transform: translate(2px, 2px); }
    80% { transform: translate(2px, -2px); }
    100% { transform: translate(0); }
}

@keyframes glitch2 {
    0% { transform: translate(0); }
    20% { transform: translate(2px, -2px); }
    40% { transform: translate(2px, 2px); }
    60% { transform: translate(-2px, -2px); }
    80% { transform: translate(-2px, 2px); }
    100% { transform: translate(0); }
}


.voltar {
    position: fixed; /* 🔥 gruda na tela inteira */
    top: 20px;       /* distância do topo */
    right: 10px;     /* 👉 colado na direita */

    font-size: 18px;
    color: #0000FF;
    text-decoration: none;

    z-index: 9999;   /* 🔥 passa por cima de tudo */
}

/* 🔥 TABS */
.tabs {
    display: flex;
    gap: 10px;
    padding: 10px;
    justify-content: center;
}

.tab {
    padding: 8px 15px;
    background: #111;
    color: #0097a7;
    border: 2px solid #0097a7;
    cursor: pointer;
    transition: 0.3s;
}

/* 👉 selecionada */
.tab.active {
    background: #ffeb3b;
    color: black;
    border-color: #ffeb3b;
    font-weight: bold;
}

/* 🔥 layout */
.main { display: flex; height: calc(100% - 150px); }

.lista { width: 25%; padding: 10px; }

.item {
    padding: 10px;
    margin-bottom: 5px;
    background: #111;
    color: #00bcd4;
    cursor: pointer;
    border: 2px solid black;
}

.item:hover { background: #00bcd4; color: black; }

.descricao {
    width: 40%;
    display: flex;
    justify-content: center;
    align-items: center;
}

.descricao-box {
    width: 90%;
    padding: 20px;
    background: rgba(0,0,0,0.85);
    color: white;
    border: 3px solid #00bcd4;
    border-radius: 10px;
}

.preview {
    width: 35%;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.preview-box {
    width: 260px;
    height: 260px;
    border: 4px solid black;
    border-radius: 10px;
    background-color: black;
    background-size: cover;
    background-position: center;
}

.downloads { margin-top: 10px; width: 260px; }

.btn-download {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #111;
    color: #00e676;
    padding: 6px;
    border: 2px solid #00e676;
    text-decoration: none;
    margin-bottom: 5px;
    font-size: 13px;
}

.btn-download:hover { background: #00e676; color: black; }
</style>
</head>

<body>

<header>
    <img src="logo.png" class="logo">
    <div class="titulo">APKs (Android)</div>
    <a href="index.html" class="voltar">⬅ Voltar</a>
</header>

<div class="tabs">
    <div class="tab active" onclick="trocarCategoria('ferramentas', this)">Ferramentas</div>
    <div class="tab" onclick="trocarCategoria('audio', this)">Áudio</div>
    <div class="tab" onclick="trocarCategoria('video', this)">Vídeo</div>
    <div class="tab" onclick="trocarCategoria('emuladores', this)">Emuladores</div>
    <div class="tab" onclick="trocarCategoria('games', this)">Games</div>
    <div class="tab" onclick="trocarCategoria('livros', this)">Livros APK</div>
</div>

<div class="main">

<div class="lista" id="lista"></div>

<div class="descricao">
    <div class="descricao-box" id="descricao"></div>
</div>

<div class="preview">
    <div class="preview-box" id="preview"></div>

    <div class="downloads">
        <a id="btnDrive" target="_blank" class="btn-download">
            <img src="imagens/icons/drive.png" width="20"> Download Google Drive
        </a>

        <a id="btnTorrent" class="btn-download">
            <img src="imagens/icons/torrent.png" width="20"> Download Torrent
        </a>
    </div>
</div>

</div>

<script>
const dados = {

ferramentas: [

],

audio: [

 {nome:"App Áudio 2", pasta:"audio2", drive:"#", torrent:"#", descricao:"Mixer potente."},
 {nome:"App Áudio 3", pasta:"audio3", drive:"#", torrent:"#", descricao:"Gravação limpa."},

],

 {nome:"App Vídeo 2", pasta:"video2", drive:"#", torrent:"#", descricao:"Cortes rápidos."},
 {nome:"App Vídeo 3", pasta:"video3", drive:"#", torrent:"#", descricao:"Renderização."},
 {nome:"App Vídeo 4", pasta:"video4", drive:"#", torrent:"#", descricao:"Efeitos visuais."},
 {nome:"App Vídeo 5", pasta:"video5", drive:"#", torrent:"#", descricao:"Compressão."}
],

emuladores: [
 {
  nome:"64 games Dynavision",
  pasta:"emu1",
  drive:"https://drive.google.com/uc?export=download&id=1qyX5ddt1-hYHcfSWjB1JXOh3MKyRqnC_",
  torrent:"magnet:?xt=urn:btih:234BAA7AFF95FF08FE887DBC35B901C43EF15391",
  descricao:"Reviva a nostalgia dos anos 90 com 64 jogos NES direto no celular.Menu organizado em 7 páginas, capas bonitas e botões flutuantes que você pode arrastar pra onde quiser na tela. 👆"
 },
 {nome:"Emulador 2", pasta:"emu2", drive:"#", torrent:"#", descricao:"Compatível com vários sistemas."},
 {nome:"Emulador 3", pasta:"emu3", drive:"#", torrent:"#", descricao:"Alta performance."},
 {nome:"Emulador 4", pasta:"emu4", drive:"#", torrent:"#", descricao:"Interface simples."},
 {nome:"Emulador 5", pasta:"emu5", drive:"#", torrent:"#", descricao:"Retro completo."}
],

games: [
 {nome:"Game 1", pasta:"game1", drive:"#", torrent:"#", descricao:"Jogo divertido."},
 {nome:"Game 2", pasta:"game2", drive:"#", torrent:"#", descricao:"Aventura épica."},
 {nome:"Game 3", pasta:"game3", drive:"#", torrent:"#", descricao:"Arcade clássico."},
 {nome:"Game 4", pasta:"game4", drive:"#", torrent:"#", descricao:"Desafio intenso."},
 {nome:"Game 5", pasta:"game5", drive:"#", torrent:"#", descricao:"Puzzle estratégico."}
],

livros: [
 {nome:"Viagem ao centro da Terra e-book", pasta:"livro1", drive:"https://drive.google.com/drive/folders/1fE5uvbekd0y_syeza5x6bnDshell6KXT?usp=drive_link", torrent:"magnet:?xt=urn:btih:812FFBC69A8463F6B08F26EE2AEB64D357F3021E&dn=Livro%20virtual%20HTML%20Viagem%20ao%20Centro%20da%20Terra.zip&tr=udp%3a%2f%2ftracker.openbittorrent.com%3a80%2fannounce&tr=udp%3a%2f%2ftracker.opentrackr.org%3a1337%2fannounce", descricao:"Livro digital interativo em formato Html,vira pagina,muda velocidade,fala o texto com IA,tema escuro,altera velocidade de leitura."},
 {nome:"Livro 2", pasta:"livro2", drive:"#", torrent:"#", descricao:"Aprendizado rápido."},
 {nome:"Livro 3", pasta:"livro3", drive:"#", torrent:"#", descricao:"Guia completo."},
 {nome:"Livro 4", pasta:"livro4", drive:"#", torrent:"#", descricao:"Manual técnico."},
 {nome:"Livro 5", pasta:"livro5", drive:"#", torrent:"#", descricao:"Referência prática."}
]

};

let categoriaAtual = "ferramentas";
let appAtual = null;
let slide = 1;
let slideshowAtivo = false;

function trocarCategoria(cat, el){
    categoriaAtual = cat;
    slideshowAtivo = false;

    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    el.classList.add("active");

    carregarLista();
}

function carregarLista(){
    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    dados[categoriaAtual].forEach(app=>{
        const div = document.createElement("div");
        div.className="item";
        div.innerText=app.nome;
        div.onclick=()=>selecionarApp(app);
        lista.appendChild(div);
    });

    selecionarApp(dados[categoriaAtual][0]);
}

function selecionarApp(app){
    appAtual = app;
    slide = 1;
    slideshowAtivo = true;

    document.getElementById("descricao").innerText = app.descricao;
    document.getElementById("preview").style.backgroundImage = "";

    document.getElementById("btnDrive").href = app.drive;
    document.getElementById("btnTorrent").href = app.torrent;
}

function slideshow(){
    if(!appAtual || !slideshowAtivo) return;

    const preview = document.getElementById("preview");
    const img = new Image();
    img.src = `imagens/apps/${appAtual.pasta}/${slide}.jpg`;

    img.onload = ()=>{
        preview.style.backgroundImage = `url('${img.src}')`;
        slide++;
    };

    img.onerror = ()=>{slide=1;};
}

setInterval(slideshow,1500);
carregarLista();
</script>

</body>
</html>
