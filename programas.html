<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Programas(Windows)</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="logo.png">

<style>
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: url('bg2.jpg');
    background-size: cover;
    background-position: center;
    color: black;
}

header {
    height: 100px;
    background: url('bg1.jpg');
    background-size: cover;
    background-position: center;

    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

.logo {
    position: absolute;
    left: 10px;
    height: 230px;
}

.titulo {
    font-size: 26px;
    font-weight: bold;
    color: #00bcd4;

    text-shadow:
        0 0 3px #00bcd4,
        0 0 6px #00bcd4,
        1px 1px 2px black;
}

/* 🔙 BOTÃO VOLTAR */
.voltar {
    position: absolute;
    right: 20px;
    top: 35px;
    font-size: 18px;
    color: #00bcd4;
    text-decoration: none;
    font-family: 'Orbitron', sans-serif;
}

/* CONTEÚDO VAZIO */
.conteudo {
    padding: 20px;
}
</style>
</head>

<body>

<header>
    <img src="logo.png" class="logo">
    <div class="titulo">Programas(Windows)</div>
    <a href="index.html" class="voltar">⬅ Voltar</a>
</header>

<div class="conteudo">
    <!-- Aqui você vai montar depois -->
</div>

</body>
</html>
